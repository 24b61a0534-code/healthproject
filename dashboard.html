<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Health Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* Hex Game Styles */
    .hex-grid { display: flex; justify-content: center; gap: 15px; padding: 20px; }
    .hex {
      width: 50px; height: 55px; background-color: #263238;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .hex span { width: 100%; height: 6px; background: #66bb6a; border-radius: 10px; }
    .hex.aligned span { background: #ffd700; box-shadow: 0 0 15px #ffd700; }
  </style>
</head>
<body>

<header><h1>Health Dashboard</h1></header>
<nav><a href="dashboard.html">Home</a><a href="tracker.html">Tracker</a><a href="login.html">Logout</a></nav>

<section class="dashboard">
  <h2 id="welcome" style="text-align: center; margin-top: 20px;">Welcome ✨</h2>
  
  <div class="dash-cards">
    <div class="dash-card">
      <h3>💧 Water</h3>
      <p id="water">0 Glasses</p>
      <button onclick="changeVal('water', 1)">+</button>
      <button onclick="changeVal('water', -1)">-</button>
    </div>
    <div class="dash-card">
      <h3>🏃 Exercise</h3>
      <p id="exercise">0 Minutes</p>
      <button onclick="changeVal('exercise', 10)">+</button>
      <button onclick="changeVal('exercise', -10)">-</button>
    </div>
    <div class="dash-card">
      <h3>😴 Sleep</h3>
      <p id="sleep">0 Hours</p>
      <button onclick="changeVal('sleep', 1)">+</button>
      <button onclick="changeVal('sleep', -1)">-</button>
    </div>
  </div>

  <h2 style="text-align:center;">Daily Progress 📊</h2>
  <div class="chart-container" style="height: 300px; background: #1e1e1e; border-radius: 15px; padding: 20px;">
    <canvas id="healthChart"></canvas>
  </div>

  <h2 style="text-align:center;">🧠 Relax & Play</h2>
  <div class="dash-cards">
    <div class="dash-card">
      <h3>Breathing (3 Sets)</h3>
      <div id="breathCircle" class="breath-container"><span id="breathText" style="font-size:0.7rem;">Ready?</span></div>
      <button id="breathBtn" onclick="startBreathing()">Start Session</button>
    </div>
    <div class="dash-card">
      <h3>🫧 Bubble Wrap</h3>
      <div class="bubble-wrap" id="bubbleWrap"></div>
      <button onclick="resetBubbles()">Reset</button>
    </div>
    <div class="dash-card">
      <h3>🌀 Hex Flow</h3>
      <div class="hex-grid">
        <div class="hex" onclick="rotateHex(this)"><span></span></div>
        <div class="hex" onclick="rotateHex(this)"><span></span></div>
        <div class="hex" onclick="rotateHex(this)"><span></span></div>
      </div>
      <p id="hexStatus" style="font-size:0.75rem; color: #aaa;">Align the paths horizontally!</p>
    </div>
  </div>

  <h2 style="text-align:center;">🩺 AI Symptom Checker</h2>
  <div class="dash-card" style="max-width: 500px; margin: 0 auto 50px auto;">
    <input type="text" id="symptomInput" placeholder="e.g. fever, headache, stress">
    <button onclick="checkSymptoms()">Analyze</button>
    <div id="diseaseResult" class="result-box" style="display:none;"></div>
  </div>
</section>

<script>
let chart;

function updateDisplay() {
    const w = parseInt(localStorage.getItem("water") || 0);
    const e = parseInt(localStorage.getItem("exercise") || 0);
    const s = parseInt(localStorage.getItem("sleep") || 0);
    document.getElementById("water").innerText = w + " Glasses";
    document.getElementById("exercise").innerText = e + " Minutes";
    document.getElementById("sleep").innerText = s + " Hours";
    renderChart(w, e, s);
}

function changeVal(key, amt) {
    let val = parseInt(localStorage.getItem(key) || 0) + amt;
    if(val < 0) val = 0;
    localStorage.setItem(key, val);
    updateDisplay();
}

function renderChart(w, e, s) {
    const ctx = document.getElementById("healthChart").getContext("2d");
    if(chart) chart.destroy();
    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ["Water", "Exercise", "Sleep"],
            datasets: [{
                data: [w, e, s],
                backgroundColor: ['#29b6f6', '#66bb6a', '#ffa726'],
                borderRadius: 5
            }]
        },
        options: { 
            responsive: true, maintainAspectRatio: false,
            scales: { 
                y: { beginAtZero: true, min: 0, max: 100, ticks: { stepSize: 10, color: '#aaa' } }
            },
            plugins: { legend: { display: false } }
        }
    });
}

// HEX LOGIC
function rotateHex(el) {
    let deg = (parseInt(el.dataset.rotate) || 0) + 60;
    el.style.transform = `rotate(${deg}deg)`;
    el.dataset.rotate = deg;
    checkHexWin();
}

function checkHexWin() {
    const hexes = document.querySelectorAll('.hex');
    let allAligned = true;
    hexes.forEach(h => {
        let rotation = (parseInt(h.dataset.rotate) || 0) % 180;
        if (rotation !== 0) allAligned = false;
    });

    if(allAligned) {
        hexes.forEach(h => h.classList.add('aligned'));
        document.getElementById("hexStatus").innerText = "Connection Established! ⚡";
        document.getElementById("hexStatus").style.color = "#ffd700";
    } else {
        hexes.forEach(h => h.classList.remove('aligned'));
        document.getElementById("hexStatus").innerText = "Align the paths horizontally!";
        document.getElementById("hexStatus").style.color = "#aaa";
    }
}

async function startBreathing() {
    const btn = document.getElementById("breathBtn");
    const circle = document.getElementById("breathCircle");
    const text = document.getElementById("breathText");
    btn.disabled = true;
    for(let i=1; i<=3; i++) {
        text.innerText = "Inhale..."; circle.classList.add("breathing-active");
        await new Promise(r => setTimeout(r, 3000));
        text.innerText = "Exhale..."; circle.classList.remove("breathing-active");
        await new Promise(r => setTimeout(r, 3000));
    }
    text.innerText = "Done! ✨"; btn.disabled = false;
}

function resetBubbles() {
    const wrap = document.getElementById("bubbleWrap"); wrap.innerHTML = "";
    for(let i=0; i<15; i++) {
        const b = document.createElement("div"); b.className = "bubble";
        b.onclick = function() { this.classList.add("popped"); };
        wrap.appendChild(b);
    }
}

function checkSymptoms() {
    let input = document.getElementById("symptomInput").value.toLowerCase();
    let res = document.getElementById("diseaseResult"); res.style.display = "block";
    let db = {
        "fever": "Possible Infection. <b>Prevention:</b> Stay hydrated and rest.",
        "stress": "Mental Fatigue. <b>Prevention:</b> Try the Breathing Space above.",
        "headache": "Dehydration. <b>Prevention:</b> Drink water and rest your eyes."
    };
    res.innerHTML = db[input] || "Unclear. Monitor your temperature and rest.";
}

window.onload = () => { updateDisplay(); resetBubbles(); };
</script>
</body>
</html>
